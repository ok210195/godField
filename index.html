<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>God Field Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══ 名前入力 ══ -->
<div id="name-input-overlay">
    <div class="name-dialog">
        <h2>守護神の名前を決めてください</h2>
        <input type="text" id="user-name-input" placeholder="名前を入力..." maxlength="10">
        <button id="submit-name-btn">決定</button>
    </div>
</div>

<!-- ══ ロビー（既存デザインそのまま） ══ -->
<div id="lobby-container" style="display:none;">
    <header class="lobby-header">
        <button class="back-btn">←</button>
        <span class="room-name">隠れ乱闘</span>
        <div class="header-right">📖 教典</div>
    </header>

    <main class="lobby-main">
        <section class="side-panel left">
            <div class="panel-label">個人戦</div>
            <button id="join-solo-btn" class="slot-circle">●</button>
            <button id="add-cpu-btn" class="cpu-btn">修行者を呼ぶ</button>
            <div class="end-time">
                <span class="label">終末の時</span>
                <span class="value">G.F.100</span>
            </div>
        </section>

        <section class="center-list">
            <div id="player-slot-0" class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
            <div class="list-item empty"></div>
        </section>

        <section class="side-panel right">
            <div class="panel-label">チーム戦</div>
            <div class="team-slot green">▲</div>
            <div class="team-slot red">▼</div>
            <div class="team-slot yellow">◆</div>
            <div class="team-slot purple">■</div>
        </section>
    </main>

    <footer class="lobby-footer">
        <button class="shuffle-btn">チームをシャッフル</button>
        <button id="start-battle-btn" class="start-btn">戦いを始める</button>
    </footer>
</div>

<!-- ══ バトル画面 ══ -->
<div id="battle-container" style="display:none;">

    <!-- ヘッダー -->
    <header class="battle-header">
        <button class="back-btn" id="battle-back-btn">←</button>
        <div class="battle-title-area">
            <span id="battle-phase-label">カードを選ぼう</span>
            <div class="gf-row">
                <span class="gf-text">G.F.</span>
                <div class="gf-track"><div id="gf-bar"></div></div>
                <span id="gf-num">0</span>
            </div>
        </div>
        <div class="header-right">📖 教典</div>
    </header>

    <!-- メイン：左＝アクション、右＝ステータス -->
    <main class="battle-main">

        <!-- 左：アクション演出 -->
        <div class="action-view">

            <!-- 攻撃者 → ターゲット -->
            <div class="turn-indicator">
                <div class="participant">
                    <span class="dot">●</span>
                    <span id="attacker-name">─</span>
                </div>
                <span class="arrow">➔</span>
                <div class="participant">
                    <span class="dot">●</span>
                    <span id="target-name">─</span>
                </div>
            </div>

            <!-- 使ったカード表示 -->
            <div class="card-action-display" id="card-action-display">
                <div class="card-graphic">
                    <div class="card-icon" id="action-icon">⚔️</div>
                    <div class="card-info">
                        <div class="card-name" id="action-card-name">待機中</div>
                        <div class="card-stats" id="action-card-stats"></div>
                    </div>
                </div>
            </div>

            <!-- ダメージバッジ＋許すボタン -->
            <div class="response-area">
                <div class="damage-badge" id="damage-badge"></div>
                <button id="forgive-btn" class="forgive-btn" style="display:none">許す</button>
            </div>

            <!-- ログ -->
            <div id="battle-log" class="battle-log"></div>
        </div>

        <!-- 右：HPステータス -->
        <div class="battle-status-panel">

            <div class="status-card" id="player-status-card">
                <div class="sc-name" id="player-sc-name">あなた</div>
                <div class="sc-hp-row">
                    <span class="sc-label">HP</span>
                    <div class="sc-bar-track"><div class="sc-bar player-bar" id="player-hp-bar"></div></div>
                    <span class="sc-val" id="player-hp-val">40</span>
                </div>
                <div class="sc-bottom">
                    <span>MP <b id="player-mp-val">10</b></span>
                    <span>￥ <b id="player-money-val">20</b></span>
                    <span>🃏 <b id="player-hand-cnt">9</b></span>
                </div>
            </div>

            <div class="vs-badge">VS</div>

            <div class="status-card cpu-card" id="cpu-status-card">
                <div class="sc-name" id="cpu-sc-name">CPU</div>
                <div class="sc-hp-row">
                    <span class="sc-label">HP</span>
                    <div class="sc-bar-track"><div class="sc-bar cpu-bar" id="cpu-hp-bar"></div></div>
                    <span class="sc-val" id="cpu-hp-val">40</span>
                </div>
                <div class="sc-bottom">
                    <span>MP <b id="cpu-mp-val">10</b></span>
                    <span>￥ <b id="cpu-money-val">20</b></span>
                    <span>🃏 <b id="cpu-hand-cnt">9</b></span>
                </div>
            </div>

        </div>
    </main>

    <!-- フッター：手札 -->
    <footer class="battle-footer">
        <!-- +カード重ねバー（addingフェーズ中のみ表示） -->
        <div id="atk-bar" class="atk-bar" style="display:none;">
            <div class="atk-bar-info">
                <span id="atk-bar-name">カード名</span>
                <span id="atk-bar-power" class="atk-bar-power">合計攻0</span>
            </div>
            <button id="atk-confirm-btn" class="atk-confirm-btn">決定！</button>
            <button id="atk-cancel-btn"  class="atk-cancel-btn">戻す</button>
        </div>
        <div class="hand-area" id="hand-area"></div>
    </footer>
</div>

<!-- ══ 結果オーバーレイ ══ -->
<div id="result-overlay" style="display:none;">
    <div class="result-box">
        <div class="result-trophy">🏆</div>
        <div class="result-msg" id="result-msg">─</div>
        <button class="retry-btn" id="retry-btn">もう一度</button>
    </div>
</div>

<!-- カード詳細パネル（ホバー時に表示） -->
<div id="card-detail-panel" class="card-detail-panel" style="display:none;">
    <img id="cd-img" src="" alt="" class="cd-img">
    <div class="cd-body">
        <div class="cd-name" id="cd-name"></div>
        <div class="cd-power" id="cd-power"></div>
        <div class="cd-ability" id="cd-ability"></div>
        <div class="cd-price" id="cd-price"></div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="main.js"></script>
</body>
</html>s
